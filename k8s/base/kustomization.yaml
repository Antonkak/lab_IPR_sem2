apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: messager
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres-init-cm.yaml
  - postgres-pvc.yaml
  - postgres.yaml
  - migrate-users-job.yaml
  - migrate-messages-job.yaml
  - minio-secret.yaml
  - minio-pvc.yaml
  - minio.yaml
  - s3-pv-local.yaml
  - user-service.yaml
  - message-service.yaml
  - bff.yaml
  - frontend.yaml
configMapGenerator:
  - name: users-migrations-cm
    options:
      disableNameSuffixHash: true
    files:
      - migrations/users/001_init.sql
  - name: messages-migrations-cm
    options:
      disableNameSuffixHash: true
    files:
      - migrations/messages/001_init.sql
      - migrations/messages/002_add_file_name.sql
