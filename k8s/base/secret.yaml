apiVersion: v1
kind: Secret
metadata:
  name: messager-db-secret
  namespace: messager
type: Opaque
stringData:
  POSTGRES_USER: "messager_user"
  POSTGRES_PASSWORD: "CHANGEME_DB_PASSWORD"
  USER_DB_DSN: "host=postgres user=messager_user password=CHANGEME_DB_PASSWORD dbname=messager_users sslmode=disable"
  MSG_DB_DSN: "host=postgres user=messager_user password=CHANGEME_DB_PASSWORD dbname=messager_messages sslmode=disable"
